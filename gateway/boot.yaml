app:
  name: gateway_service
  version: "v1.0.0"


logger:
  - name: my-logger
    zap:
      level: warn

grpc:
  - name: gateway_service_grpc
    enabled: true
    enableReflection: true
    port: 8079
    eventEntry: ""

gin:
  - name: gateway_service_http
    enabled: true
    port: 8078

  - name: gateway_service_admin
    port: 9989
    enabled: true