client:
  grpc:
    timeout: 2s
    retry:
      maxAttempts: 3
      backoff:
        base: 100ms
        max: 2s
        jitter: true
      retryableCodes: ["UNAVAILABLE","DEADLINE_EXCEEDED","RESOURCE_EXHAUSTED","ABORTED"]
    circuitBreaker:
      failuresForOpen: 10
      window: 30s
      halfOpenMaxCalls: 10
      openStateFor: 60s
    metrics: true
server:
  timeout:
    enabled: true
    ignore: [""]
    timeoutMs: 5000
    paths:
      - path: "/github.com.BurMachine.Bigtech_microservices.auth.AuthService/Register"
        timeoutMs: 1
      - path: "POST /v1/register"
        timeoutMs: 10
  rateLimit:
    enabled: true
    ignore: [""]
    reqPerSec: 1000
    paths:
      - path: "/github.com.BurMachine.Bigtech_microservices.auth.AuthService/Register" # grpc
        reqPerSec: 11
      - path: "POST /v1/register" # http
        reqPerSec: 12

tracing:
  enabled: true
  agentHost: localhost:6831    # UDP для отправки spans
  healthHost: localhost:14271  # TCP для health check (опционально)
  samplerType: const
  samplerParam: 1.0
  logSpans: false

admin:
  enabled: true
  host: "0.0.0.0"
  port: 9989
  metrics:
    enabled: true
    path: "/metrics"
  pprof:
    enabled: true
    path: "/debug/pprof"


auth:
  enabled: true
  issuer: "auth_service"
  audience:
    - "gateway_service"
  jwks:
    #    url: "http://auth-service:8071/v1/jwks"
    url: "http://localhost:8071/v1/jwks"
    cacheTtl: "5m"
    refreshTimeout: "2s"
  required: true  # Все методы требуют токен
  public:
    # gRPC методы (для microservices)
    methods:
      - "/health.HealthService/Check"
      - "/grpc.reflection.v1alpha.ServerReflection/ServerReflectionInfo"

    # HTTP пути (для Gateway/HTTP API)
    paths:
      - "/health"
      - "/metrics"
      - "/api/v1/auth/register"
      - "/api/v1/auth/login"
      - "/api/v1/auth/refresh"
      - "/v1/jwks"

shutdown:
  gracePeriod: 30s