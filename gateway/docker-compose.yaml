# Создаём общую сеть для ВСЕХ микросервисов
networks:
  messenger:
    name: messenger
    driver: bridge

services:
  # ============================================
  # GATEWAY - Главная входная точка
  # ============================================
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8078:8078"
      - "8079:8079"
    environment:
      HTTP_PORT: 8078
      AUTH_SERVICE_URL: auth:50051
      USER_SERVICE_URL: users:50052
      SOCIAL_SERVICE_URL: social:50053
      CHAT_SERVICE_URL: chat:50054
      LOG_LEVEL: debug
    networks:
      - messenger
    restart: unless-stopped
    depends_on:
       postgres:
         condition: service_healthy


  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql  # Новый volume для создания БД
    networks:
      - messenger
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ============================================
  # KAFKA - Общий брокер сообщений для всех сервисов
  # ============================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - messenger
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - messenger
    restart: unless-stopped

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'false'  # Отключаем динамическую конфигурацию
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092  # Используем внутренний адрес
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181      # Опционально
    networks:
      - messenger
    depends_on:
      - kafka

  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    hostname: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-root-token"
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_LOG_LEVEL: "info"
      SKIP_SETCAP: "true"
    cap_add:
      - IPC_LOCK
    command: server -dev -dev-listen-address=0.0.0.0:8200  # Добавьте -dev
    networks:
      - messenger
    healthcheck:
      test: [ "CMD", "vault", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ###################
  # jaeger
  ###################
  jaeger:
    image: jaegertracing/all-in-one:1.62.0 # https://www.jaegertracing.io/docs/1.62/getting-started/
    container_name: jaeger
    hostname: jaeger-agent
    environment:
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "6831:6831/udp" # accept OpenTracing (jaeger.thrift over compact thrift protocol)
      - "6832:6832/udp" # accept jaeger.thrift over binary thrift protocol
      - "5775:5775/udp" # (deprecated) accept zipkin.thrift over compact Thrift protocol (used by legacy clients only)
      - "5778:5778" # serve configs (sampling, etc.)
      - "16686:16686" # serve frontend (Web UI)
      - "4317:4317" # accept OpenTelemetry Protocol (OTLP) over gRPC
      - "4318:4318" # accept OpenTelemetry Protocol (OTLP) over HTTP
      - "14268:14268" # accept jaeger.thrift directly from clients
      - "9411:9411" # Zipkin compatible endpoint (optional)
    networks:
      - messenger


volumes:
  postgres-data: