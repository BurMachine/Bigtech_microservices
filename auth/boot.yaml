app:
  name: auth_service
  version: "v1.0.0"


logger:
  - name: my-logger
    zap:
      level: warn
grpc:
  - name: auth_service_grpc
    enabled: true
    enableReflection: true
    port: 8081
    eventEntry: ""

gin:
  - name: auth_service_http
    enabled: true
    port: 8071

  - name: auth_service_admin
    port: 9991
    enabled: true