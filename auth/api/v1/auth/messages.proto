syntax = "proto3";

package  github.com.BurMachine.Bigtech_microservices.auth;

import "buf/validate/validate.proto";

option go_package = "pkg/api/v1/auth;auth";


// Register messages

message RegisterRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string.max_len = 64];
}

message RegisterResponse {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
}

// Login messages

message LoginRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string.max_len = 64];
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  string user_id = 3 [(buf.validate.field).string.uuid = true];
}

// Refresh

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
  string user_id = 3 [(buf.validate.field).string.uuid = true];
}