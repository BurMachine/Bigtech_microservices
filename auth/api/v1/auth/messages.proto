syntax = "proto3";

package  github.com.BurMachine.Bigtech_microservices.auth;

import "buf/validate/validate.proto";

option go_package = "pkg/api/v1/auth;auth";

message RegisterRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string password = 2 [
    (buf.validate.field).string.min_len = 8,
    (buf.validate.field).string.max_len = 72  // bcrypt/argon2 обычно до 72 байт
  ];
  string nickname = 3 [
    (buf.validate.field).string = {
      min_len: 3,
      max_len: 32,
      pattern: "^[a-zA-Z0-9_]+$"
    }
  ];
}

message RegisterResponse {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
}

message LoginRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string.min_len = 8];
  string device_id = 3; // опционально
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;        // секунды
  string user_id = 4 [(buf.validate.field).string.uuid = true];
}

message RefreshRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 32];
  string device_id = 2;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  string user_id = 4;
}

message LogoutRequest {
  string refresh_token = 1;
}

message Empty {}

message JWK {
    string kid = 1; // Key ID
    string kty = 2; // Key Type (RSA)
    string use = 3; // Public Key Use (sig)
    string alg = 4; // Algorithm (RS256)
    string n = 5;   // Modulus (base64url)
    string e = 6;   // Exponent (base64url)
}

message GetJWKSRequest {}

message GetJWKSResponse {
  repeated JWK keys = 1; // ✅ Массив JWK объектов
}