client:
  grpc:
    timeout: 2s
    retry:
      maxAttempts: 3
      backoff:
        base: 100ms
        max: 2s
        jitter: true
      retryableCodes: ["UNAVAILABLE","DEADLINE_EXCEEDED","RESOURCE_EXHAUSTED","ABORTED"]
    circuitBreaker:
      failuresForOpen: 10
      window: 30s
      halfOpenMaxCalls: 10
      openStateFor: 60s
    metrics: true

server:
  timeout:
    enabled: true
    ignore: [""]
    timeoutMs: 5000
    paths:
      - path: "/github.com.BurMachine.Bigtech_microservices.auth.AuthService/Register"
        timeoutMs: 1000
  rateLimit:
    enabled: true
    ignore: [""]
    reqPerSec: 1000
    paths:
      - path: "/github.com.BurMachine.Bigtech_microservices.auth.AuthService/Register"
        reqPerSec: 12

tracing:
  enabled: true
  agentHost: localhost:6831    # UDP для отправки spans
  healthHost: localhost:14271  # TCP для health check (опционально)
  samplerType: const
  samplerParam: 1.0
  logSpans: false

shutdown:
  gracePeriod: 30s