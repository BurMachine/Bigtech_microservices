client:
  grpc:
    timeout: 2s
    retry:
      maxAttempts: 3
      backoff:
        base: 100ms
        max: 2s
        jitter: true
      retryableCodes: ["UNAVAILABLE","DEADLINE_EXCEEDED","RESOURCE_EXHAUSTED","ABORTED"]
    circuitBreaker:
      failuresForOpen: 10
      window: 30s
      halfOpenMaxCalls: 10
      openStateFor: 60s
    metrics: true

server:
  timeout:
    enabled: true
    ignore: [""]
    timeoutMs: 500000000000
    paths:
      - path: "/github.com.BurMachine.Bigtech_microservices.auth.AuthService/Register"
        timeoutMs: 100000000000000
  rateLimit:
    enabled: true
    ignore: [""]
    reqPerSec: 1000
    paths:
      - path: "/github.com.BurMachine.Bigtech_microservices.auth.AuthService/Register"
        reqPerSec: 12

tracing:
  enabled: true
  agentHost: localhost:6831    # UDP для отправки spans
  healthHost: localhost:14271  # TCP для health check (опционально)
  samplerType: const
  samplerParam: 1.0
  logSpans: false

admin:
  enabled: true
  host: "0.0.0.0"
  port: 9991
  metrics:
    enabled: true
    path: "/metrics"
  pprof:
    enabled: true
    path: "/debug/pprof"


shutdown:
  gracePeriod: 30s