services:
  auth_service:
    build:
      context: .
      dockerfile: Dockerfile
    image: auth-service:latest
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - ENV_VAR_EXAMPLE=value
    volumes:
      # Опционально: для логов (комментарий на отдельной строке)
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge