app:
  name: chat_service
  version: "v1.0.0"


logger:
  - name: my-logger
    zap:
      level: warn
grpc:
  - name: chat_service_grpc
    enabled: true
    enableReflection: true                         
    port: 8082
    eventEntry: ""

gin:
  - name: chat_service_http
    enabled: false
    port: 8080

  - name: chat_service_admin
    port: 9992
    enabled: true