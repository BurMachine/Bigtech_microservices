version: '3.8'

networks:
  messenger:
    external: true

services:
  chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat
    ports:
      - "8082:8082"
    environment:
      GRPC_PORT: 8082
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres_pass
      DB_NAME: chat_db
      DB_SSLMODE: disable
      # Kafka
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_MESSAGE_SENT: chat.message.sent
      # Outbox worker
      OUTBOX_POLL_INTERVAL: 3s
      OUTBOX_BATCH_SIZE: 200
      LOG_LEVEL: debug
    networks:
      - messenger
    restart: unless-stopped

