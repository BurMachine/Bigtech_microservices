services:
  chat_service:
    build:
      context: .
      dockerfile: Dockerfile
    image: chat-service:latest
    container_name: chat-service
    ports:
      - "8082:8082"
    environment:
      - ENV_VAR_EXAMPLE=value
    volumes:
      # Опционально: для логов (комментарий на отдельной строке)
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge