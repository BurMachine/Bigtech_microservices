# chat-service/config/platform.yaml

client:
  grpc:
    timeout: 2s
    retry:
      maxAttempts: 3
      backoff:
        base: 100ms
        max: 2s
        jitter: true
      retryableCodes: ["UNAVAILABLE","DEADLINE_EXCEEDED","RESOURCE_EXHAUSTED","ABORTED"]
    circuitBreaker:
      failuresForOpen: 10
      window: 30s
      halfOpenMaxCalls: 10
      openStateFor: 60s
    metrics: true

server:
  timeout:
    enabled: true
    ignore:
      - "/health.HealthService/Check"
      - "/grpc.reflection.v1alpha.ServerReflection/ServerReflectionInfo"
    timeoutMs: 5000
    paths:
      - path: "/github.com.BurMachine.Bigtech_microservices.chat.ChatService/SendMessage"
        timeoutMs: 3000
      - path: "/github.com.BurMachine.Bigtech_microservices.chat.ChatService/GetMessages"
        timeoutMs: 2000
      - path: "/github.com.BurMachine.Bigtech_microservices.chat.ChatService/CreateChat"
        timeoutMs: 1000
  rateLimit:
    enabled: true
    ignore:
      - "/health.HealthService/Check"
      - "/grpc.reflection.v1alpha.ServerReflection/ServerReflectionInfo"
    reqPerSec: 1000
    paths:
      - path: "/github.com.BurMachine.Bigtech_microservices.chat.ChatService/SendMessage"
        reqPerSec: 100  # Ограничение на отправку сообщений
      - path: "/github.com.BurMachine.Bigtech_microservices.chat.ChatService/GetMessages"
        reqPerSec: 200  # Чтение - можно чаще

tracing:
  enabled: true
  agentHost: localhost:6831
  healthHost: localhost:14271
  samplerType: const
  samplerParam: 1.0
  logSpans: false

admin:
  enabled: true
  host: "0.0.0.0"
  port: 9993  # Другой порт для chat-service
  metrics:
    enabled: true
    path: "/metrics"
  pprof:
    enabled: true
    path: "/debug/pprof"

# ✅ Auth блок для Chat Service
auth:
  enabled: true
  issuer: "auth-service"
  audience:
    - "chat-service"
  jwks:
    url: "http://auth-service:8081/v1/.well-known/jwks.json"
    cacheTtl: "5m"
    refreshTimeout: "2s"
  required: true  # Все методы требуют токен
  public:
    methods:
      # Только health check публичный
      - "/health.HealthService/Check"
      - "/grpc.reflection.v1alpha.ServerReflection/ServerReflectionInfo"

shutdown:
  gracePeriod: 30s