app:
  name: social_service
  version: "v1.0.0"


logger:
  - name: my-logger
    zap:
      level: warn
grpc:
  - name: social_service_grpc
    enabled: true
    enableReflection: true
    port: 8083
    eventEntry: ""

gin:
  - name: social_service_http
    enabled: false
    port: 8080

  - name: social_service_admin
    port: 9993
    enabled: true