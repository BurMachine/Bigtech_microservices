client:
  grpc:
    timeout: 2s
    retry:
      maxAttempts: 3
      backoff:
        base: 100ms
        max: 2s
        jitter: true
      retryableCodes: ["UNAVAILABLE","DEADLINE_EXCEEDED","RESOURCE_EXHAUSTED","ABORTED"]
    circuitBreaker:
      failuresForOpen: 10
      window: 30s
      halfOpenMaxCalls: 10
      openStateFor: 60s
    metrics: true
server:
  timeout:
    enabled: true
    ignore: [""]
    timeoutMs: 5000
    paths:
      - path: "/github.com.BurMachine.Bigtech_microservices.auth.AuthService/Register"
        timeoutMs: 1000
  rateLimit:
    enabled: true
    ignore: [""]
    reqPerSec: 1000
    paths:
      - path: "/github.com.BurMachine.Bigtech_microservices.auth.AuthService/Register" # http
        reqPerSec: 12

admin:
  enabled: true
  host: "0.0.0.0"
  port: 9994
  metrics:
    enabled: true
    path: "/metrics"
  pprof:
    enabled: true
    path: "/debug/pprof"



auth:
  enabled: true
  issuer: "auth_service"
  audience:
    - "user_service"
  jwks:
    #    url: "http://auth-service:8071/v1/jwks"
    url: "http://localhost:8071/v1/jwks"
    cacheTtl: "5m"
    refreshTimeout: "2s"
  required: true
  public:
    methods:
      - "/health.HealthService/Check"
      - "/grpc.reflection.v1alpha.ServerReflection/ServerReflectionInfo"

shutdown:
  gracePeriod: 30s