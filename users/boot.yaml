app:
  name: users_service
  version: "v1.0.0"


logger:
  - name: my-logger
    zap:
      level: warn
grpc:
  - name: users_service_grpc
    enabled: true
    enableReflection: true
    port: 8084
    eventEntry: ""

gin:
  - name: users_service_http
    enabled: false
    port: 808080808

  - name: users_service_admin
    port: 9994
    enabled: true